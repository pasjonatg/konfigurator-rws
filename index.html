<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfigurator RWS</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --accent: #34a853; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 950px; display: flex; gap: 30px; }
        
        .visual-side { flex: 1; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 10px; padding: 10px; border: 1px solid #eee; }
        .visual-side img { max-width: 100%; height: auto; border-radius: 5px; transition: 0.3s; }

        .form-side { flex: 1; min-width: 400px; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .logo { max-width: 130px; height: auto; }
        
        .lang-bar { display: flex; gap: 5px; }
        .lang-btn { cursor: pointer; border: 1px solid #ddd; padding: 5px 10px; border-radius: 15px; background: white; font-size: 10px; font-weight: bold; transition: 0.2s; outline: none; }
        .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        h2 { color: var(--primary); margin: 10px 0 15px 0; text-align: left; border-bottom: 2px solid #eee; padding-bottom: 15px; font-size: 20px; }
        
        label { display: block; margin-top: 15px; font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; }
        select { width: 100%; padding: 10px; margin-top: 5px; border: 2px solid #eee; border-radius: 8px; font-size: 15px; outline: none; cursor: pointer; background: #fff; }
        select:focus { border-color: var(--primary); }

        .price-box { margin-top: 20px; padding: 15px; background: #f0f7ff; border-radius: 12px; text-align: center; border: 1px solid #d0e3ff; }
        .price-label { font-size: 12px; color: #666; font-weight: bold; }
        .price-value { font-size: 28px; color: var(--primary); font-weight: 800; display: block; }
        
        .accessories-box { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 12px; border: 1px dashed #ccc; }
        .acc-title { font-size: 14px; font-weight: 800; color: #333; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .acc-item { font-size: 13px; margin-bottom: 6px; display: flex; justify-content: space-between; color: #444; }
        .acc-dynamic { margin-top: 10px; padding-top: 10px; border-top: 1px solid #ddd; font-weight: bold; color: var(--accent); }

        .specs { margin-top: 20px; font-size: 11px; color: #777; line-height: 1.4; background: #fafafa; padding: 12px; border-radius: 8px; border: 1px solid #eee; }

        @media (max-width: 850px) { .card { flex-direction: column; } .form-side { min-width: 100%; } }
    </style>
</head>
<body>

<div class="card">
    <div class="visual-side">
        <img id="mainImg" src="start.png" alt="Schemat RWS">
    </div>

    <div class="form-side">
        <div class="header-top">
            <img src="logo.jpg" alt="WUWER Logo" class="logo">
            <div class="lang-bar">
                <button class="lang-btn active" onclick="setLang('pl', this)">PL</button>
                <button class="lang-btn" onclick="setLang('en', this)">EN</button>
                <button class="lang-btn" onclick="setLang('de', this)">DE</button>
            </div>
        </div>

        <h2 id="t-title">Konfigurator RWS</h2>

        <label id="t-l-len">Wybierz długość (mm):</label>
        <select id="lenSel" onchange="updateView('len')">
            <option value="">-- wybierz --</option>
            <option value="1433.5">1433,5</option>
            <option value="1624">1624</option>
            <option value="1814.5">1814,5</option>
            <option value="2005">2005</option>
            <option value="2195.5">2195,5</option>
            <option value="2386">2386</option>
            <option value="2576.5">2576,5</option>
            <option value="2767">2767</option>
            <option value="2957.5">2957,5</option>
            <option value="3148">3148</option>
            <option value="3338.5">3338,5</option>
            <option value="3529">3529</option>
            <option value="3719.5">3719,5</option>
            <option value="3910">3910</option>
            <option value="4100.5">4100,5</option>
            <option value="4291">4291</option>
            <option value="4481.5">4481,5</option>
            <option value="4672">4672</option>
            <option value="4862.5">4862,5</option>
            <option value="5053">5053</option>
            <option value="5243.5">5243,5</option>
            <option value="5434">5434</option>
            <option value="5624.5">5624,5</option>
            <option value="5815">5815</option>
        </select>

        <label id="t-l-wid">Wybierz szerokość (mm):</label>
        <select id="widSel" onchange="updateView('wid')">
            <option value="">-- wybierz --</option>
            <option value="RL596">596</option>
            <option value="RL896">896</option>
            <option value="RL1196">1196</option>
            <option value="RL1396">1396</option>
        </select>

        <div class="price-box">
            <span id="t-price-lbl" class="price-label">Szacowana cena urządzenia:</span>
            <span class="price-value"><span id="res">---</span> EUR</span>
        </div>

        <div class="accessories-box">
            <div class="acc-title" id="t-acc-title">Akcesoria dodatkowe</div>
            <div class="acc-item"><span id="t-f-1">1 szt. Fotokomórka:</span> <span>73 EUR</span></div>
            <div class="acc-item"><span id="t-f-2">2 szt. Fotokomórka:</span> <span>146 EUR</span></div>
            <div class="acc-item"><span id="t-plate-1">Blachy przejściowe (1 strona):</span> <span>150 EUR</span></div>
            <div class="acc-item"><span id="t-plate-2">Blachy przejściowe (2 strony):</span> <span>300 EUR</span></div>
            <div class="acc-dynamic">
                <span id="t-plate-full">Koszt blach bocznych (cała długość):</span><br>
                <span id="sidePrice">---</span> EUR
            </div>
        </div>

        <div class="specs" id="t-specs">
            </div>
    </div>
</div>

<script>
    const priceData = {
        "1433.5": { "RL596": 3468.91, "RL896": 3599.09, "RL1196": 3729.28, "RL1396": 3829.14 },
        "1624": { "RL596": 3548.64, "RL896": 3683.42, "RL1196": 3818.21, "RL1396": 3922.67 },
        "1814.5": { "RL596": 3628.37, "RL896": 3767.76, "RL1196": 3907.14, "RL1396": 4016.20 },
        "2005": { "RL596": 3708.10, "RL896": 3852.09, "RL1196": 3996.07, "RL1396": 4109.73 },
        "2195.5": { "RL596": 3787.83, "RL896": 3936.42, "RL1196": 4085.00, "RL1396": 4203.26 },
        "2386": { "RL596": 3867.56, "RL896": 4020.75, "RL1196": 4173.93, "RL1396": 4296.79 },
        "2576.5": { "RL596": 3947.29, "RL896": 4105.08, "RL1196": 4262.86, "RL1396": 4390.32 },
        "2767": { "RL596": 4027.03, "RL896": 4189.41, "RL1196": 4351.79, "RL1396": 4483.85 },
        "2957.5": { "RL596": 4106.76, "RL896": 4273.74, "RL1196": 4440.72, "RL1396": 4577.38 },
        "3148": { "RL596": 4186.49, "RL896": 4358.07, "RL1196": 4529.65, "RL1396": 4670.91 },
        "3338.5": { "RL596": 4266.01, "RL896": 4442.18, "RL1196": 4618.35, "RL1396": 4764.20 },
        "3529": { "RL596": 4345.95, "RL896": 4526.73, "RL1196": 4707.52, "RL1396": 4857.98 },
        "3719.5": { "RL596": 4425.68, "RL896": 4611.06, "RL1196": 4796.45, "RL1396": 4951.51 },
        "3910": { "RL596": 4505.41, "RL896": 4695.39, "RL1196": 4885.38, "RL1396": 5045.04 },
        "4100.5": { "RL596": 4585.14, "RL896": 4779.72, "RL1196": 4974.31, "RL1396": 5138.57 },
        "4291": { "RL596": 4664.87, "RL896": 4864.05, "RL1196": 5063.24, "RL1396": 5232.10 },
        "4481.5": { "RL596": 4744.60, "RL896": 4948.39, "RL1196": 5152.17, "RL1396": 5325.63 },
        "4672": { "RL596": 4824.33, "RL896": 5032.72, "RL1196": 5241.10, "RL1396": 5419.16 },
        "4862.5": { "RL596": 4904.06, "RL896": 5117.05, "RL1196": 5330.03, "RL1396": 5512.69 },
        "5053": { "RL596": 4983.79, "RL896": 5201.38, "RL1196": 5418.96, "RL1396": 5606.22 },
        "5243.5": { "RL596": 5063.52, "RL896": 5285.71, "RL1196": 5507.89, "RL1396": 5699.75 },
        "5434": { "RL596": 5143.26, "RL896": 5370.04, "RL1196": 5596.82, "RL1396": 5793.28 },
        "5624.5": { "RL596": 5222.99, "RL896": 5454.37, "RL1196": 5685.75, "RL1396": 5886.81 },
        "5815": { "RL596": 5302.72, "RL896": 5538.70, "RL1196": 5774.68, "RL1396": 5980.34 }
    };

    const dict = {
        pl: { title: "Konfigurator RWS", lLen: "Wybierz długość (mm):", lWid: "Wybierz szerokość (mm):", pLbl: "Szacowana cena urządzenia:", wait: "-- wybierz --", acc: "Akcesoria dodatkowe (doliczane)", f1: "1 szt. Fotokomórka:", f2: "2 szt. Fotokomórka:", p1: "Blachy przejściowe (1 strona):", p2: "Blachy przejściowe (2 strony):", pf: "Koszt blach bocznych (cała długość):", specs: "<strong>Stałe parametry:</strong><br>Wysokość: 300 mm | Podziałka: 190,5 mm<br>Średnica rolki: 88,90 mm | Napęd: MOVIONE<br>Obciążenie na metr bieżący: > 500 kg" },
        en: { title: "RWS Configurator", lLen: "Select length (mm):", lWid: "Select width (mm):", pLbl: "Estimated device price:", wait: "-- select --", acc: "Additional accessories (extra cost)", f1: "1 pc. Photocells:", f2: "2 pcs. Photocells:", p1: "Transition plates (1 side):", p2: "Transition plates (2 sides):", pf: "Side plates cost (full length):", specs: "<strong>Fixed parameters:</strong><br>Height: 300 mm | Pitch: 190.5 mm<br>Roller diameter: 88.90 mm | Drive: MOVIONE<br>Load per linear meter: > 500 kg" },
        de: { title: "RWS Konfigurator", lLen: "Länge wählen (mm):", lWid: "Breite wählen (mm):", pLbl: "Geschätzter Gerätepreis:", wait: "-- wählen --", acc: "Zusätzliches Zubehör (Aufpreis)", f1: "1 Stk. Photozelle:", f2: "2 Stk. Photozelle:", p1: "Übergangsbleche (1 Seite):", p2: "Übergangsbleche (2 Seiten):", pf: "Seitenbleche Kosten (gesamte Länge):", specs: "<strong>Festparameter:</strong><br>Höhe: 300 mm | Teilung: 190,5 mm<br>Rollendurchmesser: 88,90 mm | Antrieb: MOVIONE<br>Belastung pro Laufmeter: > 500 kg" }
    };

    function setLang(l, btn) {
        if(btn) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        document.getElementById('t-title').innerText = dict[l].title;
        document.getElementById('t-l-len').innerText = dict[l].lLen;
        document.getElementById('t-l-wid').innerText = dict[l].lWid;
        document.getElementById('t-price-lbl').innerText = dict[l].pLbl;
        document.getElementById('t-acc-title').innerText = dict[l].acc;
        document.getElementById('t-f-1').innerText = dict[l].f1;
        document.getElementById('t-f-2').innerText = dict[l].f2;
        document.getElementById('t-plate-1').innerText = dict[l].p1;
        document.getElementById('t-plate-2').innerText = dict[l].p2;
        document.getElementById('t-plate-full').innerText = dict[l].pf;
        document.getElementById('t-specs').innerHTML = dict[l].specs;
        document.getElementById('lenSel').options[0].text = dict[l].wait;
        document.getElementById('widSel').options[0].text = dict[l].wait;
    }

    function updateView(mode) {
        const img = document.getElementById('mainImg');
        if(mode === 'len') img.src = "dlugosc.png";
        if(mode === 'wid') img.src = "szerokosc.png";
        calculate();
    }

    function calculate() {
        const lengthVal = document.getElementById('lenSel').value;
        const widthVal = document.getElementById('widSel').value;
        
        if (lengthVal && widthVal && priceData[lengthVal][widthVal]) {
            document.getElementById('res').innerText = priceData[lengthVal][widthVal].toLocaleString('pl-PL', { minimumFractionDigits: 2 });
        } else {
            document.getElementById('res').innerText = "---";
        }

        if (lengthVal) {
            const sidePrice = (parseFloat(lengthVal) / 190.5) * 50;
            document.getElementById('sidePrice').innerText = sidePrice.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        } else {
            document.getElementById('sidePrice').innerText = "---";
        }
    }
    
    // Inicjalizacja stałych parametrów przy starcie
    setLang('pl', null);
</script>
</body>
</html>
