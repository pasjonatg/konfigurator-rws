<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfigurator RWS</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        
        .lang-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .lang-btn { cursor: pointer; border: 1px solid #ddd; padding: 6px 12px; border-radius: 20px; background: white; font-size: 11px; font-weight: bold; transition: 0.2s; outline: none; }
        .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        h2 { color: var(--primary); margin: 0 0 15px 0; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; font-size: 22px; }
        
        label { display: block; margin-top: 20px; font-size: 13px; font-weight: 600; color: #555; text-transform: uppercase; }
        select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; outline: none; cursor: pointer; background: #fff; }
        select:focus { border-color: var(--primary); }

        .price-box { margin-top: 30px; padding: 25px; background: #f0f7ff; border-radius: 12px; text-align: center; border: 1px solid #d0e3ff; }
        .price-label { font-size: 13px; color: #666; font-weight: bold; }
        .price-value { font-size: 32px; color: var(--primary); font-weight: 800; display: block; margin-top: 5px; }
        
        .specs { margin-top: 25px; font-size: 13px; color: #777; line-height: 1.6; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <div class="lang-bar">
        <button class="lang-btn active" onclick="setLang('pl', this)">POLSKI</button>
        <button class="lang-btn" onclick="setLang('en', this)">ENGLISH</button>
        <button class="lang-btn" onclick="setLang('de', this)">DEUTSCH</button>
    </div>

    <h2 id="t-title">Konfigurator RWS</h2>

    <label id="t-l-len">Wybierz długość (mm):</label>
    <select id="lenSel" onchange="calculate()">
        <option value="">-- wybierz --</option>
        <option value="1433.5">1433,5</option>
        <option value="1624">1624</option>
        <option value="1814.5">1814,5</option>
        <option value="2005">2005</option>
        <option value="2195.5">2195,5</option>
        <option value="2386">2386</option>
        <option value="2576.5">2576,5</option>
        <option value="2767">2767</option>
        <option value="2957.5">2957,5</option>
        <option value="3148">3148</option>
        <option value="3338.5">3338,5</option>
        <option value="3529">3529</option>
        <option value="3719.5">3719,5</option>
        <option value="3910">3910</option>
        <option value="4100.5">4100,5</option>
        <option value="4291">4291</option>
        <option value="4481.5">4481,5</option>
        <option value="4672">4672</option>
        <option value="4862.5">4862,5</option>
        <option value="5053">5053</option>
        <option value="5243.5">5243,5</option>
        <option value="5434">5434</option>
        <option value="5624.5">5624,5</option>
        <option value="5815">5815</option>
    </select>

    <label id="t-l-wid">Wybierz szerokość (mm):</label>
    <select id="widSel" onchange="calculate()">
        <option value="">-- wybierz --</option>
        <option value="RL596">RL596</option>
        <option value="RL896">RL896</option>
        <option value="RL1196">RL1196</option>
        <option value="RL1396">RL1396</option>
    </select>

    <div class="price-box">
        <span id="t-price-lbl" class="price-label">Szacowana cena:</span>
        <span class="price-value"><span id="res">---</span> EUR</span>
    </div>

    <div class="specs" id="t-specs">
        <strong>Stałe parametry:</strong><br>
        Wysokość: 300 mm | Podziałka: 190,5 mm<br>
        Średnica rolki: 88,90 mm | Napęd: MOVIONE
    </div>
</div>

<script>

    const priceData = {

        "2767": { "RL596": 4027.03, "RL896": 4189.41, "RL1196": 4351.79, "RL1396": 4483.85 },
        "2957.5": { "RL596": 4106.76, "RL896": 4273.74, "RL1196": 4440.72, "RL1396": 4577.38 },
        "3148": { "RL596": 4186.49, "RL896": 4358.07, "RL1196": 4529.65, "RL1396": 4670.91 },
        "3338.5": { "RL596": 4266.01, "RL896": 4442.18, "RL1196": 4618.35, "RL1396": 4764.20 },
        "3529": { "RL596": 4345.95, "RL896": 4526.73, "RL1196": 4707.52, "RL1396": 4857.98 },
        "3719.5": { "RL596": 4425.68, "RL896": 4611.06, "RL1196": 4796.45, "RL1396": 4951.51 },

        "4100.5": { "RL596": 4585.14, "RL896": 4779.72, "RL1196": 4974.31, "RL1396": 5138.57 },
        "4291": { "RL596": 4664.87, "RL896": 4864.05, "RL1196": 5063.24, "RL1396": 5232.10 },
        "4481.5": { "RL596": 4744.60, "RL896": 4948.39, "RL1196": 5152.17, "RL1396": 5325.63 },

        "5815": { "RL596": 5302.72, "RL896": 5538.70, "RL1196": 5774.68, "RL1396": 5980.34 }
    };

    const dict = {
        pl: { title: "Konfigurator RWS", lLen: "Wybierz długość (mm):", lWid: "Wybierz szerokość (mm):", pLbl: "Szacowana cena:", wait: "-- wybierz --", specs: "<strong>Stałe parametry:</strong><br>Wysokość: 300 mm | Podziałka: 190,5 mm<br>Średnica rolki: 88,90 mm | Napęd: MOVIONE" },
        en: { title: "RWS Configurator", lLen: "Select length (mm):", lWid: "Select width (mm):", pLbl: "Estimated price:", wait: "-- select --", specs: "<strong>Fixed parameters:</strong><br>Height: 300 mm | Pitch: 190.5 mm<br>Roller diameter: 88.90 mm | Drive: MOVIONE" },
        de: { title: "RWS Konfigurator", lLen: "Länge wählen (mm):", lWid: "Breite wählen (mm):", pLbl: "Geschätzter Preis:", wait: "-- wählen --", specs: "<strong>Festparameter:</strong><br>Höhe: 300 mm | Teilung: 190,5 mm<br>Rollendurchmesser: 88,90 mm | Antrieb: MOVIONE" }
    };

    function setLang(l, btn) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('t-title').innerText = dict[l].title;
        document.getElementById('t-l-len').innerText = dict[l].lLen;
        document.getElementById('t-l-wid').innerText = dict[l].lWid;
        document.getElementById('t-price-lbl').innerText = dict[l].pLbl;
        document.getElementById('t-specs').innerHTML = dict[l].specs;
        document.getElementById('lenSel').options[0].text = dict[l].wait;
        document.getElementById('widSel').options[0].text = dict[l].wait;
    }

    function calculate() {
        const length = document.getElementById('lenSel').value;
        const width = document.getElementById('widSel').value;
        const resultElement = document.getElementById('res');

        if (length && width && priceData[length] && priceData[length][width]) {
            const price = priceData[length][width];
            resultElement.innerText = price.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        } else {
            resultElement.innerText = "---";
        }
    }
</script>

</body>
</html>
